<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fearless Console V10.5 - 0326 穩定架構版</title>
<style>
  :root {
    --bg:#0a0c10; --surface:#12161f; --border:#252d3d; --border-hi:#3a4560;
    --text:#e2eaf8; --muted:#6b7a99; --accent:#7eb8ff; --teal:#00d4aa; --red:#ff4d6d;
  }
  body { font-family: 'Segoe UI', system-ui; background: var(--bg); color: var(--text); padding: 20px; font-size: 14px; }
  .panel { max-width: 900px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .title { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 20px; border-bottom: 2px solid var(--teal); padding-bottom: 10px; }
  .cfg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .cfg-box { border: 1px solid var(--border); padding: 15px; border-radius: 4px; background: rgba(0,0,0,0.2); }
  .label { font-size: 11px; color: var(--teal); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: block; }
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  input { background: #000; border: 1px solid var(--border-hi); color: var(--accent); padding: 5px 8px; border-radius: 3px; width: 75px; font-family: monospace; }
  button { background: var(--teal); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; transition: 0.2s; }
  button:disabled { background: #444; color: #888; cursor: not-allowed; }
  #fetchLog { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 15px; background: #000; padding: 10px; border-radius: 4px; height: 150px; overflow-y: auto; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
  th { text-align: left; color: var(--muted); padding: 10px; border-bottom: 2px solid var(--border); }
  td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="panel">
  <div class="title">📡 V10.5 動能策劃 (0326 穩定架構)</div>
  
  <div class="cfg-grid">
    <div class="cfg-box">
      <span class="label">動能與風險參數</span>
      <div class="row"><span>現金緩衝 (%)</span><input type="number" id="momBuffer" value="0.5" step="0.1"></div>
      <div class="row"><span>盾牌分數 (0-100)</span><input type="number" id="shieldScore" value="65"></div>
      <div class="row"><span>最大持股數</span><input type="number" id="momMaxHold" value="5"></div>
    </div>
    <div class="cfg-box">
      <span class="label">資產池 (Yahoo Tickers)</span>
      <input type="text" id="tickerList" value="VOO,VTV,QQQ,IWM,VEA,VWO,GLD" style="width:100%; margin-bottom:10px; background:#000; border:1px solid #3a4560; color:#7eb8ff; padding:5px;">
      [span_5](start_span)<div style="font-size:10px; color:var(--muted)">支援多重代理：Worker / AllOrigins / CodeTabs[span_5](end_span)</div>
    </div>
  </div>

  <button id="runBtn" onclick="runEngine()">🌐 啟動全自動擷取與 V10.0 計算</button>
  <div id="fetchLog">系統就緒，請按按鈕執行...</div>

  <div id="resultSection" style="display:none;">
    <table>
      <thead><tr><th>代碼</th><th>Z-Score</th><th>σ (波動率)</th><th>TS 狀態</th><th style="text-align:right">權重 (%)</th></tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>
</div>

<script>
/** ════ 仿效 0326 版：核心配置 ════ **/
[span_6](start_span)const API_FRED_KEY = "258bf0113f3cc4ec207f3160731c459e";[span_6](end_span)
[span_7](start_span)const MAIN_PROXY = "https://shield-proxy.depross0205.workers.dev?url=";[span_7](end_span)

[span_8](start_span)// 代理池輪詢機制[span_8](end_span)
function buildProxies() {
  return [MAIN_PROXY, 'https://api.allorigins.win/raw?url=', 'https://api.codetabs.com/v1/proxy?quest='].filter(Boolean);
}

[span_9](start_span)// 仿效 0326 fetchFB 工具[span_9](end_span)
async function fetchFB(url, proxies) {
  let lastErr;
  for (let i = 0; i < proxies.length; i++) {
    try {
      let res = await fetch(proxies[i] + encodeURIComponent(url));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res;
    } catch (e) { lastErr = e; logUpdate(`⚠️ 代理 ${i+1} 失敗...`); }
  }
  throw lastErr || new Error('所有 Proxy 均失敗');
}

async function runEngine() {
  const logEl = document.getElementById('fetchLog');
  const btn = document.getElementById('runBtn');
  const tickers = document.getElementById('tickerList').value.split(',').map(t => t.trim());
  const shield = parseFloat(document.getElementById('shieldScore').value);
  const buffer = parseFloat(document.getElementById('momBuffer').value) / 100;
  const proxies = buildProxies();

  btn.disabled = true;
  logEl.innerHTML = "🚀 [1/3] 正在同步 FRED 兩年期利率 (DGS2)...";
  
  try {
    [span_10](start_span)// 1. 抓取 FRED 數據[span_10](end_span)
    const fredUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=DGS2&api_key=${API_FRED_KEY}&file_type=json&sort_order=desc&limit=1`;
    const fredRes = await fetchFB(fredUrl, proxies);
    const fredData = await fredRes.json();
    const cashRate = parseFloat(fredData.observations[0].value) / 100;
    logUpdate(`✅ 利率獲取成功: ${(cashRate * 100).toFixed(2)}%`);

    [span_11](start_span)// 2. 抓取 Yahoo 數據[span_11](end_span)
    logUpdate("🚀 [2/3] 正在擷取 Yahoo 歷史價格 (252D)...");
    const allStats = [];
    const end = Math.floor(Date.now() / 1000);
    const start = end - (400 * 24 * 60 * 60);

    for (let ticker of tickers) {
      try {
        const yhUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${start}&period2=${end}&interval=1d`;
        const res = await fetchFB(yhUrl, proxies);
        const j = await res.json();
        
        [span_12](start_span)[span_13](start_span)// ★ 精確資料路徑修正：chart.result[0].indicators.adjclose[0].adjclose[span_12](end_span)[span_13](end_span)
        const chart = j.chart.result[0];
        const indicators = chart.indicators;
        let prices = [];
        
        if (indicators.adjclose && indicators.adjclose[0].adjclose) {
          prices = indicators.adjclose[0].adjclose.filter(p => p !== null);
        } else {
          prices = indicators.quote[0].close.filter(p => p !== null);
        }

        if (prices.length >= 252) {
          const stats = calculateV10(ticker, prices, cashRate, buffer);
          allStats.push(stats);
          logUpdate(`📊 ${ticker} 同步完成`);
        }
      } catch (e) { logUpdate(`❌ ${ticker} 失敗: ${e.message}`); }
    }

    [span_14](start_span)[span_15](start_span)// 3. 權重分配[span_14](end_span)[span_15](end_span)
    renderV10(allStats, shield);
    logUpdate("🏆 全自動分析任務已結束。");

  } catch (err) { logUpdate(`🚨 核心錯誤: ${err.message}`); }
  finally { btn.disabled = false; }
}

function calculateV10(ticker, prices, cashRate, buffer) {
  const last = prices.length - 1;
  [span_16](start_span)[span_17](start_span)// 12-1 策略：扣除最近一個月 (21 交易日)[span_16](end_span)[span_17](end_span)
  const r12 = (prices[last - 21] / prices[last - 252]) - 1;
  const r6  = (prices[last - 21] / prices[last - 126]) - 1;
  const r3  = (prices[last - 21] / prices[last - 63]) - 1;

  [span_18](start_span)// 60 日年化波動率[span_18](end_span)
  const rets = [];
  for (let i = last - 60; i < last; i++) rets.push(Math.log(prices[i+1] / prices[i]));
  const sigma = Math.sqrt(rets.reduce((a, b) => a + b*b, 0) / (rets.length - 1) * 252);

  [span_19](start_span)// Z-Score 加權計分[span_19](end_span)
  const score = (0.5 * (r12/sigma)) + (0.3 * (r6/sigma)) + (0.2 * (r3/sigma));
  return { ticker, score, sigma, r12, isTsPass: r12 > (cashRate + buffer), rawW: score/sigma };
}

function renderV10(stats, shield) {
  const maxHold = parseInt(document.getElementById('momMaxHold').value);
  [span_20](start_span)const winners = stats.filter(s => s.isTsPass && s.score > 0).sort((a,b) => b.score - a.score).slice(0, maxHold);[span_20](end_span)
  
  [span_21](start_span)[span_22](start_span)// 盾牌縮放邏輯[span_21](end_span)[span_22](end_span)
  let exp = shield >= 70 ? 1 : shield >= 50 ? (shield-50)*0.02 + 0.4 : shield >= 30 ? (shield-30)*0.02 : 0;
  const totalW = winners.reduce((sum, s) => sum + s.rawW, 0);

  const body = document.getElementById('resultBody');
  body.innerHTML = winners.map(s => {
    const w = (s.rawW / totalW) * exp * 100;
    return `<tr><td style="font-weight:700">${s.ticker}</td><td style="color:var(--accent)">${s.score.toFixed(2)}</td><td>${(s.sigma*100).toFixed(1)}%</td><td style="color:var(--teal)">PASS</td><td style="text-align:right;font-weight:700;color:var(--teal)">${w.toFixed(1)}%</td></tr>`;
  }).join('');
  document.getElementById('resultSection').style.display = winners.length ? 'block' : 'none';
}

function logUpdate(msg) {
  const el = document.getElementById('fetchLog');
  el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}
</script>
</body>
</html>
