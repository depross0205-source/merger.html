<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🛡️ 矛與盾 V10 FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0a0c10;color:#e2eaf8;font-family:sans-serif;padding:20px}
.card{background:#12161f;border:1px solid #252d3d;padding:10px;margin-bottom:10px}
button{padding:8px 12px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<h2>🛡️ 矛與盾 V10 FINAL</h2>

<div class="card">
<input type="file" id="csv">
<button onclick="run()">▶ Run Backtest</button>
</div>

<div class="card" id="metrics"></div>
<canvas id="nav" height="200"></canvas>
<canvas id="dd" height="150"></canvas>

<script>
let DB=[];

document.getElementById('csv').onchange=e=>{
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=ev=>{
    const l=ev.target.result.split('\n').slice(1);
    DB=l.map(x=>{
      const c=x.split(',');
      return {
        d:c[0],
        sp:+c[1],
        cape:+c[6],
        hy:+c[3],
        y10:+c[7],
        y2:+c[8],
        tips:+c[4]
      }
    }).filter(x=>x.sp);
  }
  r.readAsText(f);
}

const lp=(x,x0,x1,y0,y1)=>y0+(y1-y0)*Math.max(0,Math.min(1,(x-x0)/(x1-x0)));

function run(){

let eqA=100000, eqB=100000, bh=100000;
let modeA='N', modeB='N';
let curve=[];
let ddSeries=[];

let peakA=eqA, peakBH=bh;

for(let i=1;i<DB.length;i++){

  const r=(DB[i].sp-DB[i-1].sp)/DB[i-1].sp;

  // ===== Score =====
  const fVal=lp(100/DB[i].cape-DB[i].tips,0,4,10,100);
  const fCredit=lp(DB[i].hy*100,250,600,80,20);
  const yc=DB[i].y10-DB[i].y2;
  const fCurve=lp(yc,-1,2,20,100);

  const score=0.35*fVal+0.35*fCredit+0.3*fCurve;

  // ===== Crash Trigger =====
  let force = r < -0.025;

  // ===== Decide Mode FIRST =====
  let newA = score>=60?'P':score>=40?'N':'C';
  if(force) newA='C';

  let newB = score>=60?'P':'C';

  modeA=newA;
  modeB=newB;

  // ===== Apply Exposure =====
  const expA = modeA==='P'?1.5:modeA==='N'?1:0;
  const expB = modeB==='P'?1:0;

  eqA *= (1 + expA*r);
  eqB *= (1 + expB*r);
  bh *= (1 + r);

  // ===== Drawdown =====
  peakA = Math.max(peakA, eqA);
  peakBH = Math.max(peakBH, bh);

  ddSeries.push({
    A:(eqA/peakA-1)*100,
    BH:(bh/peakBH-1)*100
  });

  curve.push({d:DB[i].d,A:eqA,B:eqB,BH:bh});
}

// ===== Metrics =====
function calcMetrics(series){
  const start=series[0], end=series[series.length-1];
  const years=series.length/252;
  const cagr=Math.pow(end/start,1/years)-1;

  let peak=series[0], maxDD=0;
  for(let v of series){
    peak=Math.max(peak,v);
    maxDD=Math.min(maxDD,(v/peak-1));
  }

  return {cagr,maxDD};
}

const mA=calcMetrics(curve.map(x=>x.A));
const mBH=calcMetrics(curve.map(x=>x.BH));

document.getElementById('metrics').innerHTML=`
A CAGR: ${(mA.cagr*100).toFixed(1)}% |
A DD: ${(mA.maxDD*100).toFixed(1)}%<br>
BH CAGR: ${(mBH.cagr*100).toFixed(1)}% |
BH DD: ${(mBH.maxDD*100).toFixed(1)}%
`;

// ===== Chart =====
new Chart(nav.getContext('2d'),{
  type:'line',
  data:{
    labels:curve.map(x=>x.d),
    datasets:[
      {label:'A',data:curve.map(x=>x.A)},
      {label:'B&H',data:curve.map(x=>x.BH)}
    ]
  }
});

new Chart(dd.getContext('2d'),{
  type:'line',
  data:{
    labels:curve.map(x=>x.d),
    datasets:[
      {label:'A DD',data:ddSeries.map(x=>x.A)},
      {label:'BH DD',data:ddSeries.map(x=>x.BH)}
    ]
  }
});

}
</script>

</body>
</html>
