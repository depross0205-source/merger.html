<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>矛與盾 V8.4 Full</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0a0c10;color:#e2eaf8;font-family:Arial;padding:20px}
button{margin:5px;padding:8px}
</style>
</head>
<body>

<h2>🛡️ 矛與盾 V8.4 Full</h2>

<!-- ===== 新增 Cash 控制 ===== -->
<div>
  <label>Cash Yield</label>
  <input type="checkbox" id="useCash" checked>
  <label>利率%</label>
  <input type="number" id="cashRate" value="4" step="0.1">
</div>

<button onclick="runBacktest()">▶ 回測</button>
<button onclick="exportTrades()">⬇ Trades CSV</button>
<button onclick="exportNAV()">⬇ NAV CSV</button>

<canvas id="navChart" height="120"></canvas>

<script>

let DB = [];
let BT_RESULT = null;

// ===== 模擬資料（你可換掉）=====
for(let i=0;i<1200;i++){
  DB.push({
    d: "2020-"+String((i%12)+1).padStart(2,'0')+"-"+String((i%28)+1).padStart(2,'0'),
    sp: 3000 + i*3 + Math.random()*40,
    vix: 15+Math.random()*10,
    cape: 25+Math.random()*5,
    hy: 3+Math.random(),
    tips: 1.5,
    y10: 4,
    y2: 3.5
  });
}

function runBacktest(){

  const useCash = document.getElementById('useCash').checked;
  const cashRate = parseFloat(document.getElementById('cashRate').value)/100;
  const cashDaily = cashRate/252;

  let eqA=100000, eqB=100000, eqC=100000, eqD=100000, eqBH=100000;

  let pA=1, pB=1, pC=1, pD=1;

  let trades=[];

  for(let i=1;i<DB.length;i++){

    const r = DB[i];
    const prev = DB[i-1];

    const ret = (r.sp - prev.sp)/prev.sp;

    // ===== 模擬 score =====
    const score = 50 + (Math.random()*40-20);

    // ===== Regime =====
    let regime = "MID";
    if(r.vix < 18) regime="ON";
    if(r.vix > 25) regime="OFF";

    // ===== 簡化策略 =====
    pA = score>60 ? 1.5 : score<40 ? 0 : 1;
    pB = score>60 ? 1.2 : score<40 ? 0 : 1;

    pC = (pA>0 && pB>0) ? 1 : 0;
    pD = Math.min(pA,pB);

    // ===== V8.4 核心（Cash）=====
    function calc(eq,p){

      let total;

      if(useCash){
        total = (p*ret) + ((1-p)*cashDaily);
      }else{
        total = p*ret;
      }

      return eq*(1+total);
    }

    eqA = calc(eqA,pA);
    eqB = calc(eqB,pB);
    eqC = calc(eqC,pC);
    eqD = calc(eqD,pD);

    eqBH = eqBH*(1+ret);

    trades.push({
      date:r.d,
      price:r.sp,
      ret:ret,
      regime:regime,

      A_pos:pA,A_eq:eqA,
      B_pos:pB,B_eq:eqB,
      C_pos:pC,C_eq:eqC,
      D_pos:pD,D_eq:eqD,

      BH:eqBH
    });
  }

  BT_RESULT = {trades};

  drawChart(trades);
}

// ===== 畫圖 =====
function drawChart(trades){

  const ctx = document.getElementById('navChart');

  new Chart(ctx,{
    type:'line',
    data:{
      labels:trades.map(x=>x.date),
      datasets:[
        {label:'A',data:trades.map(x=>x.A_eq),borderColor:'yellow'},
        {label:'B',data:trades.map(x=>x.B_eq),borderColor:'lime'},
        {label:'C',data:trades.map(x=>x.C_eq),borderColor:'cyan'},
        {label:'D',data:trades.map(x=>x.D_eq),borderColor:'magenta'},
        {label:'BH',data:trades.map(x=>x.BH),borderColor:'gray'}
      ]
    }
  });
}

// ===== 匯出 =====
function exportTrades(){

  if(!BT_RESULT){alert('先回測');return;}

  const rows = BT_RESULT.trades;

  const header = Object.keys(rows[0]).join(',');

  const csv = rows.map(r=>Object.values(r).join(','));

  downloadCSV(header,csv,'trades_v84.csv');
}

function exportNAV(){

  const rows = BT_RESULT.trades.map(r=>({
    date:r.date,
    A:r.A_eq,B:r.B_eq,C:r.C_eq,D:r.D_eq,BH:r.BH
  }));

  const header = Object.keys(rows[0]).join(',');
  const csv = rows.map(r=>Object.values(r).join(','));

  downloadCSV(header,csv,'nav_v84.csv');
}

function downloadCSV(header,rows,name){

  const blob = new Blob([[header,...rows].join('\n')],{type:'text/csv'});
  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

</script>
</body>
</html>
