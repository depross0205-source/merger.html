<div class="card" style="border-top: 4px solid var(--teal); background: #1a1a1a; color: white; padding: 20px;">
    <h3 style="color:var(--teal)">📡 V10.5 自動化數據採集中心</h3>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
        <div class="cfg-box">
            <label>FRED API Key:</label>
            <input type="text" id="fredKey" placeholder="輸入你的 FRED API Key" style="width:100%; background:#333; color:white; border:1px solid #555;">
        </div>
        <div class="cfg-box">
            <label>候選標的 (逗號分隔):</label>
            <input type="text" id="tickerList" value="VOO,VTV,QQQ,IWM,VEA,VWO,GLD" style="width:100%; background:#333; color:white; border:1px solid #555;">
        </div>
    </div>

    <button class="btn-teal" onclick="fetchAllData()" id="fetchBtn">🌐 開始全自動抓取與計算</button>
    <div id="fetchLog" style="font-size:11px; color:#888; margin-top:10px; font-family:monospace;"></div>
</div>

<script>
// 使用 YH Finance 的公開 API (需透過中繼代理或 GAS)
const YH_PROXY = "https://query1.finance.yahoo.com/v8/finance/chart/";
const FRED_BASE = "https://api.stlouisfed.org/fred/series/observations";

async function fetchAllData() {
    const btn = document.getElementById('fetchBtn');
    const log = document.getElementById('fetchLog');
    const tickers = document.getElementById('tickerList').value.split(',');
    const fredKey = document.getElementById('fredKey').value;

    if(!fredKey) return alert("請輸入 FRED API Key！");
    
    btn.disabled = true;
    log.innerHTML = "⏳ 正在啟動引擎...";

    try {
        // 1. 抓取 FRED 利率 (DGS2)
        log.innerHTML += "<br>▶ 正在從 FRED 抓取兩年期美債利率...";
        const cashRate = await getFredRate(fredKey);
        log.innerHTML += ` [完成] 當前利率: ${cashRate}%`;

        // 2. 循環抓取 Yahoo Finance 數據
        const allStats = [];
        for (let ticker of tickers) {
            log.innerHTML += `<br>▶ 正在抓取 ${ticker} 歷史價格...`;
            const data = await getYahooData(ticker.trim());
            if (data) {
                const stats = processV10Logic(ticker, data, cashRate);
                allStats.push(stats);
            }
        }

        // 3. 執行動能輪動與 Volatility Scaling
        renderV10Results(allStats);
        log.innerHTML += "<br>✅ 全自動分析完成！";

    } catch (e) {
        log.innerHTML += `<br>❌ 錯誤: ${e.message}`;
    } finally {
        btn.disabled = false;
    }
}

async function getFredRate(key) {
    const url = `${FRED_BASE}?series_id=DGS2&api_key=${key}&file_type=json&sort_order=desc&limit=1`;
    const resp = await fetch(url); // 注意：若在本地執行可能會有 CORS 問題，建議在 GAS 執行
    const json = await resp.json();
    return parseFloat(json.observations[0].value);
}

async function getYahooData(ticker) {
    // 抓取過去一年的日資料 (約 252 筆)
    const end = Math.floor(Date.now() / 1000);
    const start = end - (365 * 24 * 60 * 60 * 1.5); // 抓 1.5 年確保夠用
    const url = `${YH_PROXY}${ticker}?period1=${start}&period2=${end}&interval=1d`;
    
    // 實務上建議透過你的後端 Proxy 呼叫，避免被 Yahoo 封鎖
    const resp = await fetch(url);
    const json = await resp.json();
    return json.chart.result[0].indicators.adjclose[0];
}

function processV10Logic(ticker, prices, cashRate) {
    // 這裡實作你 V9.5/V10.0 的核心公式
    // prices 為日頻 adj close 陣列
    const last = prices.length - 1;
    
    // 計算報酬 (12m, 6m, 3m) - 這裡簡化取 252, 126, 63 天
    const r12 = (prices[last] / prices[last - 252]) - 1;
    const r6 = (prices[last] / prices[last - 126]) - 1;
    const r3 = (prices[last] / prices[last - 63]) - 1;

    // 計算 60 日年化波動率
    const rets = [];
    for(let i = last - 60; i < last; i++) rets.push(Math.log(prices[i+1]/prices[i]));
    const sigma = Math.sqrt(calculateVariance(rets) * 252);

    // Z-Score (與自身波動率標定)
    const score = (0.5 * (r12/sigma)) + (0.3 * (r6/sigma)) + (0.2 * (r3/sigma));
    
    return { ticker, score, sigma, r12, isTsPass: r12 > (cashRate/100) };
}

function calculateVariance(arr) {
    const m = arr.reduce((a, b) => a + b) / arr.length;
    return arr.reduce((a, b) => a + Math.pow(b - m, 2), 0) / (arr.length - 1);
}
</script>
